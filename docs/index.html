<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="내 작업물을 모아 보여주는 개인 갤러리입니다."
    >
    <title>내 작업물 갤러리</title>
    <link rel="stylesheet" href="src/styles.css">
    <script type="module" src="src/gallery-app.js?v=20260703-dashboard-ui"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./">
        <span class="brand-mark" aria-hidden="true">JY</span>
        <span class="brand-text">내 작업물 갤러리</span>
      </a>
      <nav class="primary-nav" aria-label="주요 메뉴">
        <a href="#gallery">작업물</a>
        <a href="#process">진행 방식</a>
      </nav>
    </header>

    <main>
      <section class="hero" aria-labelledby="hero-title">
        <h1 id="hero-title">내 작업물 갤러리</h1>
        <p class="hero-copy">만든 것들을 간단히 모아두는 공간.</p>
        <div class="summary-strip" aria-label="갤러리 요약">
          <div>
            <strong data-stat-projects>0</strong>
            <span>작업물</span>
          </div>
          <div>
            <strong data-stat-links>0</strong>
            <span>공개 링크</span>
          </div>
          <div>
            <strong data-stat-updated>-</strong>
            <span>최근 업데이트</span>
          </div>
        </div>
      </section>

      <section class="gallery-section" id="gallery" aria-labelledby="gallery-title">
        <div class="section-heading">
          <h2 id="gallery-title">작업물</h2>
          <p data-result-count>0개 프로젝트</p>
        </div>

        <div class="filter-chips" aria-label="프로젝트 필터" data-filter-chips></div>

        <p data-status-message role="status" aria-live="polite" hidden></p>
        <div class="project-grid" data-project-grid></div>
      </section>

      <section class="process-section" id="process" aria-labelledby="process-title">
        <div class="section-heading">
          <h2 id="process-title">진행 방식</h2>
        </div>
        <div class="process-list">
          <article class="process-item">
            <span class="process-dot" aria-hidden="true">1</span>
            <div>
              <h3>데이터는 <code>projects.json</code>으로 관리</h3>
              <p>새 작업물을 추가할 때 제목, 설명, 태그, 링크만 기록합니다.</p>
            </div>
          </article>
          <article class="process-item">
            <span class="process-dot" aria-hidden="true">2</span>
            <div>
              <h3>프로젝트 완료 후 Codex가 기록 업데이트</h3>
              <p>사이트 구조는 유지하고, 프로젝트 데이터만 추가하는 방식으로 관리합니다.</p>
            </div>
          </article>
        </div>
      </section>

      <footer class="site-footer">
        <p>프로젝트 데이터는 <code>projects.json</code>에서 관리합니다.</p>
      </footer>
    </main>
  </body>
</html>
